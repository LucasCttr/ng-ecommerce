<h1>Listado</h1>
<div class="row g-3">
  @for (item of products(); track item.id) {
    <div class="col-6 col-md-4 col-lg-2">
      <app-card [title]="item.title" [text]="item.description" [price]="item.price" [images]="item.images" />
    </div>
  }
</div>

<nav class="mt-4">
  <div class="d-flex justify-content-center align-items-center gap-3">
    
    <button class="btn btn-outline-primary" 
            [disabled]="productService.page() === 1"
            (click)="changePage(productService.page() - 1)">
      Anterior
    </button>

    <span>Página {{ productService.page() }} de {{ totalPages() }}</span>

    <button class="btn btn-outline-primary" 
            [disabled]="productService.page() >= totalPages()"
            (click)="changePage(productService.page() + 1)">
      Siguiente
    </button>

  </div>
</nav>
