<div class="card border-0 shadow-sm" style="height: 340px">
  <img
    class="card-img-top"
    [src]="images()[0]"
    style="height: 150px; object-fit: contain"
    alt="Imagen"
  />

  <div class="card-body d-flex flex-column">
    <h5 class="card-title">{{ title() }}</h5>

    <p class="card-text small text-muted clamp-text mb-0">
      {{ text() }}
    </p>

    <div class="mt-auto d-flex justify-content-between align-items-center">
      <p class="card-price fw-bold fs-5 text-success mb-0">${{ price() }}</p>
      <div class="d-flex gap-2">
      <button class="btn btn-outline-primary btn-sm" (click)="cartService.addToCart(id())">Add to Cart</button>
      <button class="btn btn-outline-primary btn-sm">Details</button>
      </div>
    </div>
  </div>
</div>
