<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

<div class="sidebar bg-white border-end p-3" style="width: 280px; min-height: 100vh;">

  <!-- Logo / Título -->
  <div class="d-flex align-items-center gap-2 mb-4 px-2">
    <i class="bi bi-shop fs-4 text-primary"></i>
    <h5 class="mb-0 fw-bold">Mi Tienda</h5>
  </div>

  <!-- Buscador -->
  <div class="input-group mb-4">
    <span class="input-group-text bg-light border-end-0"><i class="bi bi-search"></i></span>
    <input type="text" class="form-control border-start-0 bg-light" placeholder="Buscar productos...">
  </div>

  <!-- Categorías -->
  <h6 class="text-uppercase text-muted small fw-bold mb-2 px-2">Categorías</h6>
  <ul class="nav nav-pills flex-column mb-4">
    <li class="nav-item">
      <a href="#" class="nav-link active d-flex align-items-center gap-2">
        <i class="bi bi-grid"></i> Todos los productos
      </a>
    </li>
    <li class="nav-item">
      <a href="#" class="nav-link d-flex align-items-center gap-2 text-dark">
        <i class="bi bi-phone"></i> Electrónica
      </a>
    </li>
    <li class="nav-item">
      <a href="#" class="nav-link d-flex align-items-center gap-2 text-dark">
        <i class="bi bi-shirt"></i> Ropa
      </a>
    </li>
    <li class="nav-item">
      <a href="#" class="nav-link d-flex align-items-center gap-2 text-dark">
        <i class="bi bi-house"></i> Hogar
      </a>
    </li>
    <li class="nav-item">
      <a href="#" class="nav-link d-flex align-items-center gap-2 text-dark">
        <i class="bi bi-controller"></i> Gaming
      </a>
    </li>
  </ul>

  <!-- Filtro de precio (colapsable) -->
  <div class="mb-3">
    <button class="btn btn-sm w-100 d-flex justify-content-between align-items-center px-2 text-dark fw-bold text-uppercase small"
            type="button" data-bs-toggle="collapse" data-bs-target="#filtroPrecio">
      Precio
      <i class="bi bi-chevron-down"></i>
    </button>
    <div class="collapse show" id="filtroPrecio">
      <div class="px-2 pt-2">
        <div class="form-check">
          <input class="form-check-input" type="checkbox" id="precio1">
          <label class="form-check-label small" for="precio1">Menos de $10.000</label>
        </div>
        <div class="form-check">
          <input class="form-check-input" type="checkbox" id="precio2">
          <label class="form-check-label small" for="precio2">$10.000 - $50.000</label>
        </div>
        <div class="form-check">
          <input class="form-check-input" type="checkbox" id="precio3">
          <label class="form-check-label small" for="precio3">Más de $50.000</label>
        </div>
      </div>
    </div>
  </div>

  <!-- Filtro de marca (colapsable) -->
  <div class="mb-3">
    <button class="btn btn-sm w-100 d-flex justify-content-between align-items-center px-2 text-dark fw-bold text-uppercase small"
            type="button" data-bs-toggle="collapse" data-bs-target="#filtroMarca">
      Marca
      <i class="bi bi-chevron-down"></i>
    </button>
    <div class="collapse show" id="filtroMarca">
      <div class="px-2 pt-2">
        <div class="form-check">
          <input class="form-check-input" type="checkbox" id="marca1">
          <label class="form-check-label small" for="marca1">Samsung</label>
        </div>
        <div class="form-check">
          <input class="form-check-input" type="checkbox" id="marca2">
          <label class="form-check-label small" for="marca2">Apple</label>
        </div>
        <div class="form-check">
          <input class="form-check-input" type="checkbox" id="marca3">
          <label class="form-check-label small" for="marca3">Sony</label>
        </div>
      </div>
    </div>
  </div>

  <!-- Botón limpiar filtros -->
  <button class="btn btn-outline-secondary btn-sm w-100 mt-2">
    <i class="bi bi-x-circle"></i> Limpiar filtros
  </button>

</div>
