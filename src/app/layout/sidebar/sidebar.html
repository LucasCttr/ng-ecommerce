<div class="sidebar bg-white border-end p-3">
  <div class="d-flex align-items-center gap-2 mb-4 px-2">
    <i class="bi bi-shop fs-4 text-primary"></i>
    <h5 class="mb-0 fw-bold">Mi Tienda</h5>
  </div>
  <hr />

  <!-- Busqueda -->
  <div class="mb-4">
    <h6 class="text-uppercase text-muted small fw-bold mb-2 px-2">Buscar</h6>
    <div class="px-2">
      <input
        type="text"
        class="form-control form-control-sm"
        placeholder="Buscar productos..."
        [ngModel]="productService.searchInput()"
        (ngModelChange)="productService.searchInput.set($event); productService.getProducts()"
      />
    </div>
  </div>
  <hr />

  <!-- Precio -->
  <div class="mb-4">
    <h6 class="text-uppercase text-muted small fw-bold mb-2 px-2">Precio</h6>
    <div class="px-2 d-flex gap-2 align-items-center">
      <input
        type="number"
        class="form-control form-control-sm"
        placeholder="Min"
        [(ngModel)]="minInput"
      />
      <span>-</span>
      <input
        type="number"
        class="form-control form-control-sm"
        placeholder="Max"
        [(ngModel)]="maxInput"
      />
    </div>
    <button type="button" class="btn btn-sm btn-primary w-100 mt-2" (click)="applyPriceFilter()">
      Apply
    </button>
  </div>
  <hr />

  <!-- Categorías -->
  <h6 class="text-uppercase text-muted small fw-bold mb-2 px-2">Categorías</h6>
  <ul class="nav nav-pills flex-column mb-4">
    <li class="nav-item">
      <button
        type="button"
        class="btn btn-link nav-link d-flex align-items-center gap-2 w-100 text-start"
        [class.active]="productService.selectedCategory() === null"
        (click)="selectCategory(null)"
      >
        <i class="bi bi-grid"></i> Todos los productos
      </button>
    </li>
    @for (cat of productService.categories; track cat) {
      <li class="nav-item">
        <button
          type="button"
          class="btn btn-link nav-link d-flex align-items-center gap-2 w-100 text-start text-dark"
          [class.active]="productService.selectedCategory() === cat"
          (click)="selectCategory(cat)"
        >
          {{ cat }}
        </button>
      </li>
    }
  </ul>
  <hr />

  <button type="button" class="btn btn-outline-secondary btn-sm w-100" (click)="clearAll()">
    <i class="bi bi-x-circle"></i> Limpiar filtros
  </button>
</div>
